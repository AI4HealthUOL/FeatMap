target_manipulations:
  STANFORD_CARS:
    direct:
      models: ["linear", "mlp", "cnn", "transformer"]
      manipulations:
        - grayscale
        - hue_shift_60
        - noise_40
        - mask_big_square_center
        - mask_bottom_right_square
        - mask_small_square_center
        - mask_top_left_square

    qwen_gs_1_infsteps_10:
      models: ["linear", "mlp", "cnn", "transformer"]
      manipulations:
        - Turn_on_headlights
        - Add_police_lights
        - Change_body_color_blue
        - Change_tire_rim_color_red
        - Remove_side_mirrors

    # Geometric transform specific models
    geom_tf_apply_group:
      models: ["linear", "mlp", "cnn", "transformer"]
      manipulations:
        - rotation_90
        - rotation_180
        - rotation_270
        - mirror_h
        - mirror_v
      apply_transform: true

    geom_tf_learned_group:
      models: ["transformer"]
      manipulations:
        - rotation_90
        - rotation_180
        - rotation_270
        - mirror_h
        - mirror_v
      apply_transform: false

model_path: "$WORK/models/"
norm_params_path: "$WORK/models/norm_params"
evals_path: "$WORK/evals_mapping"
dataset_path: "$WORK/datasets"

ft_models: [
 #"convnext_base.fb_in22k_ft_in1k_frozen_stages0-stages1-stages2-stages3_train_best.ckpt",
 "convnext_base.fb_in22k_ft_in1k_frozen_stages0-stages1-stages2-stages3_augmented_train_best.ckpt"]

extracted_features_dir: "augmented_test"

batch_size: 128

loss: "COMBINED"

feature_keys: 
  feat0:
    input_dim: 128
    output_dim: 128
    spatial_size: 72
    normalized: true

  feat1:
    input_dim: 256
    output_dim: 256
    spatial_size: 36
    normalized: true

  feat2:
    input_dim: 512
    output_dim: 512
    spatial_size: 18
    normalized: true

  feat3:
    input_dim: 1024
    output_dim: 1024
    spatial_size: 9
    normalized: false


models:
  linear: ""
  linear_rotation_90: ""
  linear_rotation_180: ""
  linear_rotation_270: ""
  linear_mirror_h: ""
  linear_mirror_v: ""
  mlp:
     hidden_dim: 512
     dropout: 0.2
  cnn:
     hidden_dim: 512
     kernel_size: 3
     dropout: 0.2
  transformer:
    num_layers: 4
    num_heads: 8
    hidden_dim: 512
    dropout: 0.2